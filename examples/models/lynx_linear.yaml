# Linear observation model for notebook init (copy B into lynx.yaml MLP fit).
n_knots: 14
path_anchor: start
path_mode: identity
path_groups:
  shared: {}
blocks:
  - id: z1
    path_group: shared
    input: z1
    covariate_kind: array
  - id: z2
    path_group: shared
    input: z2
    covariate_kind: array
observation:
  terms:
    - kind: linear
      inputs: [z1, z2]
train:
  epochs: 1500
  lr: 0.03
  fit_lambda: 0.5
  seed: 0
