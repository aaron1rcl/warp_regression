n_knots: 8
path_anchor: start
path_mode: identity
path_groups:
  shared: {}
blocks:
  - id: z
    path_group: shared
    input: z
    covariate_kind: array
observation:
  terms:
    - kind: log_trend
    - kind: envelope_sine
      inputs: [z]
      hidden: 32
      layers: 2
      act: relu
train:
  epochs: 24000
  lr: 0.2
  fit_lambda: 0.5
  seed: 0
