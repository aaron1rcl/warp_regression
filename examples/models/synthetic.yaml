n_knots: 8
path_anchor: start
path_mode: identity
path_groups:
  shared: {}
blocks:
  - id: x
    path_group: shared
    input: x
    covariate_kind: array
observation:
  terms:
    - kind: linear
      inputs: [x]
      A_init: 1.0
      C_init: 0.0
train:
  epochs: 5000
  lr: 0.03
  fit_lambda: 0.5
  seed: 0
