n_knots: 24
path_anchor: start
path_mode: identity
path_groups:
  shared: {}
blocks:
  - id: z1
    path_group: shared
    input: z1
    sample: array
  - id: z2
    path_group: shared
    input: z2
    sample: array
observation:
  terms:
    - kind: mlp_on_warped
      inputs: [z1, z2]
      hidden: 32
      layers: 2
      act: gelu
train:
  epochs: 2500
  lr: 0.03
  fit_lambda: 0.5
  seed: 0
